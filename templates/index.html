{% extends "base.html" %}

{% block content %}
<h1>{{ section.title }}</h1>
{{ section.content | safe }}

<div class="mod-grid">
    {% set ck3 = get_section(path="ck3/_index.md") %}
    {% for page in ck3.pages %}
        <div class="mod-card">
            <a href="{{ page.permalink }}">
                {% if page.extra.image %}
                    <img src="{{ get_url(path=page.extra.image) }}" alt="{{ page.title }}">
                {% endif %}
                <h3>{{ page.title }}</h3>
            </a>
            <p>{{ page.description }}</p>
        </div>
    {% endfor %}
</div>

{% endblock content %}
